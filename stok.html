<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Stok - Cattix</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f3f4f6;
}

/* TOPBAR */
.topbar {
  height: 60px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid #e5e7eb;
}

.logo-cattix {
  height: 40px;
}

/* CONTAINER */
.container {
  padding: 30px;
}

/* FORM */
.form {
  background: white;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 120px;
  gap: 10px;
}

.form input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.form button {
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* SEARCH */
.search input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* TABLE */
.table-box {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th {
  background: #f9fafb;
  padding: 14px;
  font-weight: 600;
  color: #374151;
  border-bottom: 1px solid #e5e7eb;
}

td {
  padding: 14px;
  border-bottom: 1px solid #f1f1f1;
}

tr:hover {
  background: #f9fafb;
}

/* ALIGN */
td:nth-child(2),
td:nth-child(3) {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

td:last-child {
  text-align: center;
}

/* ACTION */
.actions {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.actions button {
  height: 32px;
  min-width: 60px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.edit {
  background: #f59e0b;
  color: white;
}

.delete {
  background: #ef4444;
  color: white;
}

/* BADGE STOK */
.stock-badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}

.stock-zero {
  background: #fee2e2;
  color: #b91c1c;
}

.stock-low {
  background: #fef3c7;
  color: #b45309;
}

.stock-ok {
  background: #dcfce7;
  color: #166534;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.modal-actions {
  display: flex;
  gap: 10px;
}

.modal-actions button {
  flex: 1;
}

.cancel {
  background: #9ca3af;
}

.back-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
}

.back-btn:hover {
  background: #4338ca;
}

</style>
</head>

<body>

<div class="topbar">

  <div style="display:flex; align-items:center; gap:10px;">
    <button onclick="goBack()" class="back-btn">←</button>
    <h3>Stok Produk</h3>
  </div>

  <img src="img/logo.png" class="logo-cattix">
  
</div>

<div class="container">

  <div class="form">
    <input type="text" id="name" placeholder="Nama Produk">
    <input type="text" id="price" placeholder="Harga">
    <input type="number" id="stock" placeholder="Stok">
    <button onclick="tambahProduk()">Tambah</button>
  </div>

  <div class="search">
    <input type="text" placeholder="Cari produk..." oninput="search(this.value)">
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Harga</th>
          <th>Stok</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit Produk</h3>

    <input type="text" id="edit-name">
    <input type="text" id="edit-price">
    <input type="number" id="edit-stock">

    <div class="modal-actions">
      <button onclick="saveEdit()">Simpan</button>
      <button class="cancel" onclick="closeModal()">Batal</button>
    </div>
  </div>
</div>

<script type="module" src="js/stok.js"></script>
</body>
</html>
